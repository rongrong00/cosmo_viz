# Phase 2 camera: multiple projection types
camera:
  type: perspective
  position: [14884.0, 17185.0, 24000.0]
  look_at: [14884.0, 17185.0, 29644.0]
  up: [0, 1, 0]
  fov: 32.0
  ortho_width: 5000.0
  image_width: 1024
  image_height: 1024

projections:
  - field: gas_density
    mode: column
  - field: dm_density
    mode: column
  - field: temperature
    mode: mass_weighted
  - field: metallicity
    mode: mass_weighted
  - field: gas_velocity
    mode: los_velocity
